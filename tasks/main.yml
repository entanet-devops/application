- name: Install ACL package
  apt:
    name: acl
    state: present

- name: Install application.
  apt: 
    deb: "{{ app_deb_package }}"

- name: Create app user.
  user:
    name: "{{ app_user }}"
    comment: App user
    system: yes

- name: Chown Apps directory
  file:
    dest: "{{ app_directory }}"
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    recurse: yes

- name: Chown npm cache directory
  file:
    path: /var/www/
    state: directory
    recurse: yes
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: '0755'

- name: Set custom php ini values
  include_tasks: php.yml

- name: Check if composer.json exists
  stat:
    path: "{{ app_directory }}/composer.json"
  register: run_composer

- name: Validate PHP framework
  include_tasks: validation.yml

- become: true
  become_user: "{{ app_user }}"
  block:
    - name: Set bitbucket auth for private composer packages.
      shell: "composer config --global --auth bitbucket-oauth.bitbucket.org {{ bitbucket_consumer_key }} {{ bitbucket_consumer_secret }}"
      when:
        - bitbucket_consumer_key != ""
        - bitbucket_consumer_secret != ""
        - run_composer.stat.exists

    - name: Composer Install.
      composer:
        command: install
        no_dev: no
        working_dir: "{{ app_directory }}"
      when: run_composer.stat.exists

    - include_tasks: testing.yml
    - include_tasks: behat.yml
    - include_tasks: env.yml

    - name: Check if npm package.json exists
      stat:
        path: "{{ app_directory }}/package.json"
      register: run_npm

    - name: Check if pnpm-lock.yaml exists
      stat:
        path: "{{ app_directory }}/pnpm-lock.yaml"
      register: run_pnpm

    - name: Set bitbucket auth for private npm packages.
      copy:
        dest: "{{ app_directory }}/.npmrc"
        content: |
          @cityfibre:registry=https://npm.pkg.bitbucket.org
          //npm.pkg.bitbucket.org/:username={{ bitbucket_consumer_key }}
          //npm.pkg.bitbucket.org/:_password={{ bitbucket_consumer_secret | b64encode }}
          //npm.pkg.bitbucket.org/:email=npm@cityfibre.com
          always-auth=true
      when:
        - npm_install
        - run_npm.stat.exists
        - not run_pnpm.stat.exists
        - bitbucket_consumer_key != ""
        - bitbucket_consumer_secret != ""

    - name: npm install
      command: "npm install"
      args:
        chdir: "{{ app_directory }}"
      when: npm_install and run_npm.stat.exists and not run_pnpm.stat.exists

    - name: npm run prod
      command: "npm run prod"
      args:
        chdir: "{{ app_directory }}"
      when: npm_install and run_npm.stat.exists and not run_pnpm.stat.exists

    - name: Configure pnpm authentication for private Bitbucket packages
      copy:
        dest: "{{ app_directory }}/.npmrc"
        content: |
          @cityfibre:registry=https://npm.pkg.bitbucket.org
          //npm.pkg.bitbucket.org/:username={{ bitbucket_consumer_key }}
          //npm.pkg.bitbucket.org/:_password={{ bitbucket_consumer_secret | b64encode }}
          //npm.pkg.bitbucket.org/:email=npm@cityfibre.com
          always-auth=true
      when:
        - npm_install
        - run_pnpm.stat.exists
        - bitbucket_consumer_key != ""
        - bitbucket_consumer_secret != ""

    - name: Get latest-10 version from @pnpm/exe dist-tags
      uri:
        url: "https://registry.npmjs.org/@pnpm/exe"
        method: GET
        return_content: true
      register: pnpm_registry_response
      when: npm_install and run_pnpm.stat.exists

    - name: Set pnpm latest-10 version fact
      set_fact:
        pnpm_latest_10_version: "{{ pnpm_registry_response.json['dist-tags']['latest-10'] }}"
        pnpm_platform: "linux"
        pnpm_arch: "x64"
        pnpm_archive_url: "https://github.com/pnpm/pnpm/releases/download/v{{ pnpm_registry_response.json['dist-tags']['latest-10'] }}/pnpm-linux-x64"
        pnpm_bin: "/home/ubuntu/.local/share/pnpm/pnpm"
      when: npm_install and run_pnpm.stat.exists

    - name: "Downloading pnpm binaries {{ pnpm_latest_10_version }}"
      get_url:
        url: "{{ pnpm_archive_url }}"
        dest: "/tmp/pnpm"
        mode: '0755'
      when: npm_install and run_pnpm.stat.exists

    - name: Run pnpm setup
      command:
        cmd: "/tmp/pnpm setup --force"
      environment:
        SHELL: "{{ ansible_facts['env']['SHELL'] }}"
      when: npm_install and run_pnpm.stat.exists

    - name: Run pnpm install in app dir
      ansible.builtin.command:
      cmd: "{{ pnpm_bin }} install"
      chdir: "{{ app_directory }}"
      environment:
        NPM_CONFIG_USERCONFIG: "{{ app_directory }}/.npmrc"
      when: npm_install and run_pnpm.stat.exists
    
    # - name: Run pnpm install in app dir
    #   command: pnpm install
    #   args:
    #     chdir: "{{ app_directory }}"
    #   environment:
    #     NPM_CONFIG_USERCONFIG: "{{ app_directory }}/.npmrc"
    #   when: npm_install and run_pnpm.stat.exists

    - name: pnpm run build
      command: pnpm run build
      args:
        chdir: "{{ app_directory }}"
      environment:
        NPM_CONFIG_USERCONFIG: "{{ app_directory }}/.npmrc"
      when: npm_install and run_pnpm.stat.exists

    - name: Remove auth file after install
      file:
        path: "{{ app_directory }}/.npmrc"
        state: absent
      when: npm_install and (run_npm.stat.exists or run_pnpm.stat.exists)  

    - name: Composer install to remove dev dependecies.
      composer:
        command: install
        working_dir: "{{ app_directory }}"
      when: run_composer.stat.exists

    - name: Craft Security Key Generate.
      shell: 'php craft setup/security-key'
      args:
        chdir: "{{ app_directory }}"
      when: (fact_craftcms_version | default([], true)) | length > 0 and app_env.APP_KEY is not defined

    - name: Artisan Key Generate.
      shell: 'php artisan key:generate'
      args:
        chdir: "{{ app_directory }}"
      when: (fact_laravel_version | default([], true)) | length > 0 and app_env.APP_KEY is not defined

    - name: Configure laravel cronjob
      cron:
        name: Laravel Cron
        user: "{{ app_user }}"
        job: "cd {{ app_directory }} && php artisan schedule:run >> /dev/null 2>&1"
      when: (fact_laravel_version | default([], true)) | length > 0
